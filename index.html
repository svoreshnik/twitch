        .header { background: #18181b; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #303032; position: sticky; top: 0; z-index: 100; }

        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(145, 71, 255, 0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .play-btn::after { content: ''; border-style: solid; border-width: 10px 0 10px 18px; border-color: transparent transparent transparent #fff; margin-left: 4px; }
        .view-count { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 12px; color: white; }

        /* ИНФО О КАНАЛЕ */

        .avatar { width: 40px; height: 40px; background: #9147ff; border-radius: 50%; margin-right: 12px; }
