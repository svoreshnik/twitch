<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Twitch Insider: Exclusive Leak</title>

        body { background: #0f0f0f; color: #efeff1; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        .nav { background: #18181b; padding: 15px; border-bottom: 1px solid #303032; color: #a970ff; font-weight: 800; font-size: 18px; text-align: left; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; text-align: left; }
        .category { color: #eb0400; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        h1 { font-size: 22px; line-height: 1.3; margin-bottom: 12px; color: #fff; }
        
        .video-box { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; border: 1px solid #303032; cursor: pointer; }
        .video-box img { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 5; }
        .play-circle { background: #9146ff; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(145, 70, 255, 0.5); }
        .play-triangle { border-style: solid; border-width: 12px 0 12px 20px; border-color: transparent transparent transparent white; margin-left: 5px; }

        /* Спец-слои */
        #scary-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: black url('scary.jpg') no-repeat center center; background-size: cover; }
        #flag-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: linear-gradient(to bottom, #fff 33.3%, #0039a6 33.3% 66.6%, #d52b1e 66.6%); }
    </style>
</head>
