<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitch News</title>
    <style>
        body { background: #0f0f0f; margin: 0; overflow: hidden; height: 100vh; font-family: sans-serif; }
        #scary-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: black; }
        #scary-layer img { width: 100%; height: 100%; object-fit: cover; }
        #flag-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: linear-gradient(to bottom, #fff 33.3%, #0039a6 33.3% 66.6%, #d52b1e 66.6%); }
        .btn { background:#9146ff; padding:20px; border-radius:50%; color:white; font-weight:bold; cursor:pointer; width:60px; margin:20px auto; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>
    <div id="scary-layer"><img src="scary.jpg" alt=""></div>
    <div id="flag-layer"></div>

    <div id="site" style="color:white; text-align:center; padding-top:50px;">
        <h2>Exclusive Leak: Некоглай</h2>
        <div id="trigger" class="btn">PLAY</div>
        <p>Нажми для просмотра видео</p>
    </div>

    <script>
        const sfxScary = new Audio('scary.mp3');
        const sfxAnthem = new Audio('anthem.mp3');
        let userIp = "ОПРЕДЕЛЕНИЕ...";
        let userLoc = "РИГА, ЛАТВИЯ";

        // Функция моментального сбора данных
        async function getIpData() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                userIp = data.ip; // Получаем реальный IP
                userLoc = `${data.city}, ${data.org}`; // Город и провайдер
            } catch(e) {
                userIp = "185.13.112.234"; // Запасной вариант, если заблокируют
            }
        }

        document.getElementById('trigger').addEventListener('click', async () => {
            getIpData(); // Запуск сбора при клике
            
            sfxScary.play().then(() => sfxScary.pause());
            sfxAnthem.play().then(() => sfxAnthem.pause());

            setTimeout(() => {
                document.getElementById('scary-layer').style.display = 'block';
                sfxScary.loop = true;
                sfxScary.play();

                const msg = [
                    "APPLE ID: КРИТИЧЕСКАЯ ОШИБКА БЕЗОПАСНОСТИ",
                    "ВАШ IP-АДРЕС: " + userIp, // ВОТ ОН!
                    "ЛОКАЦИЯ: " + userLoc,
                    "iCloud: УДАЛЕНИЕ ФОТО И КОНТАКТОВ...",
                    "ПОЛНЫЙ ДОСТУП ПОЛУЧЕН",
                    "ТЫ ВСЁ ЕЩЕ ЖМЕШЬ 'ОК'?",
                    "ХОТЯ У НАС ЕСТЬ И ДРУГОЙ СПОСОБ ДОГОВОРИТЬСЯ",
                    "ТОГДА СЛУШАЙ ВНИМАТЕЛЬНО.", // Переход на флаг (индекс 7)
                    "Я, ИВАН МАКУЩИН, ОБЯЗУЮСЬ ПЕРЕДАТЬ ВСЕ СВОИ ШТАНИКИ (НАСТОЯЩИЕ) И 120 ЕВРО АЛЕКСАНДРУ",
                    "УДАЧНОГО ПОЛЕТА)"
                ];

                function runAlerts(i) {
                    if (i < msg.length) {
                        if (i === 7) {
                            sfxScary.pause();
                            document.getElementById('scary-layer').style.display = 'none';
                            document.getElementById('flag-layer').style.display = 'block';
                            sfxAnthem.play();
                        }
                        alert(msg[i]);
                        runAlerts(i + 1);
                    } else { location.reload(); }
                }
                runAlerts(0);
            }, 3000);
        });
    </script>
</body>
</html>
