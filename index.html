<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitch News: Некоглай об инциденте с Катаной</title>
    <style>
        body { background: #0f0f0f; color: #efeff1; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .nav { background: #18181b; padding: 15px; border-bottom: 1px solid #303032; color: #a970ff; font-weight: 800; font-size: 18px; letter-spacing: 1px; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .category { color: #eb0400; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        h1 { font-size: 22px; line-height: 1.3; margin-bottom: 12px; color: #fff; }
        .meta { color: #adadb8; font-size: 12px; margin-bottom: 20px; border-bottom: 1px solid #26262c; padding-bottom: 15px; }
        .article-intro { font-size: 15px; color: #dedee3; line-height: 1.5; margin-bottom: 20px; }
        .video-box { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; border: 1px solid #303032; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 5; }
        .play-circle { background: #9146ff; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(145, 70, 255, 0.5); }
        .play-triangle { border-style: solid; border-width: 12px 0 12px 20px; border-color: transparent transparent transparent white; margin-left: 5px; }
        .footer { margin-top: 40px; padding: 20px; border-top: 1px solid #26262c; color: #53535f; font-size: 11px; text-align: center; }
        .scary-bg { background: url('scary.jpg') no-repeat center center !important; background-size: cover !important; }
        .hide-all { display: none !important; }
    </style>
</head>
<body>
    <div id="site-content">
        <div class="nav">TWITCH INSIDER</div>
        <div class="container">
            <div class="category">Exclusive Leak</div>
            <h1>Комментарии Некоглая об инциденте (ВИДЕО)</h1>
            <div class="meta">Сегодня, 18:42 • 145,200 просмотров</div>
            <p class="article-intro">Что на самом деле произошло между Некоглаем и Катаной? Смотрите эксклюзивный фрагмент стрима.</p>
            <div class="video-box" id="trigger">
                <div class="play-overlay" id="overlay">
                    <div class="play-circle"><div class="play-triangle"></div></div>
                </div>
                <video id="v" playsinline poster="news-thumb.jpg">
                    <source src="video.mp4" type="video/mp4">
                </video>
            </div>
            <div class="footer">© 2026 Twitch Interactive, Inc. All rights reserved.</div>
        </div>
    </div>

    <script>
        const v = document.getElementById('v');
        const trigger = document.getElementById('trigger');
        const overlay = document.getElementById('overlay');
        const site = document.getElementById('site-content');

        const sfxScary = new Audio('scary.mp3');
        const sfxAnthem = new Audio('anthem.mp3');
        sfxScary.loop = true;

        trigger.addEventListener('click', async () => {
            overlay.style.display = 'none';
            
            // КРИТИЧЕСКИЙ ФИКС ЗВУКА: Будим аудио при клике
            sfxScary.play().then(() => sfxScary.pause());
            sfxAnthem.play().then(() => sfxAnthem.pause());
            
            v.play(); 

            let bat = "??%";
            try {
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    bat = Math.round(b.level * 100) + "%";
                }
            } catch (e) {}

            setTimeout(() => {
                site.classList.add('hide-all');
                document.body.classList.add('scary-bg');
                
                sfxScary.currentTime = 0;
                sfxScary.play();
                
                if (navigator.vibrate) { navigator.vibrate([1000, 500, 1000]); }

                const msg = [
                    "APPLE ID: КРИТИЧЕСКАЯ ОШИБКА БЕЗОПАСНОСТИ",
                    "ОБНАРУЖЕНА УТЕЧКА ВСЕХ ПАРОЛЕЙ И КЛЮЧЕЙ",
                    "ЛОКАЦИЯ ВХОДА: ЛАТВИЯ, РИГА.",
                    "ВАШ ЗАРЯД БАТАРЕИ: " + bat,
                    "ДОСТУП К ФОТО ПРЕДОСТАВЛЕН",
                    "УДАЛЕНИЕ КОНТАКТОВ НАЧАТО",
                    "ПОЛНЫЙ ДОСТУП ПОЛУЧЕН",
                    "ЗАПУСК ПОЛНОГО УДАЛЕНИЯ ДАННЫХ",
                    "ТЫ ВСЁ ЕЩЕ ЖМЕШЬ 'ОК'?",
                    "ВАШИ ПАРОЛИ БЫЛИ УТЕРЯНЫ",
                    "ДЛЯ ИХ ВОЗВРАТА МОЖЕТЕ ОСУЩЕСТВИТЬ ПЕРЕВОД",
                    "ХОТЯ У НАС ЕСТЬ И ДРУГОЙ СПОСОБ ДОГОВОРИТЬСЯ",
                    "ТОГДА СЛУШАЙ ВНИМАТЕЛЬНО.",
                    "Я, ИВАН МАКУЩИН, ОБЯЗУЮСЬ ПЕРЕДАТЬ ВСЕ СВОИ ШТАНИКИ (НАСТОЯЩИЕ) И 120 ЕВРО АЛЕКСАНДРУ",
                    "УДАЧНОГО ПОЛЕТА)"
                ];

                function runAlerts(i) {
                    if (i < msg.length) {
                        if (i === 12) { 
                            sfxScary.pause();
                            sfxAnthem.currentTime = 0;
                            sfxAnthem.play();
                            document.body.classList.remove('scary-bg');
                            document.body.style.background = "linear-gradient(white 33%, blue 33% 66%, red 66%)";
                        }
                        alert(msg[i]);
                        runAlerts(i + 1);
                    } else {
                        location.reload();
                    }
                }
                runAlerts(0);
            }, 3000); 
        });
    </script>
</body>
</html>
